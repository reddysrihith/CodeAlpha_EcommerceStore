<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ShopAlpha — E-commerce Store</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f8fafc;color:#1e293b;min-height:100vh}
nav{background:#1e293b;color:#fff;padding:.9rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px #0003}
nav .logo{font-weight:800;font-size:1.2rem;color:#818cf8}
nav .nav-links{display:flex;gap:1rem;align-items:center}
nav button{background:none;border:none;color:#cbd5e1;cursor:pointer;font-size:.95rem;padding:.4rem .8rem;border-radius:6px;transition:background .15s}
nav button:hover{background:#334155;color:#fff}
nav .btn-primary{background:#6366f1;color:#fff !important}
nav .btn-primary:hover{background:#4f46e5}
.container{max-width:1100px;margin:0 auto;padding:2rem}
h1{font-size:1.8rem;font-weight:700;margin-bottom:1.5rem;color:#1e293b}
h2{font-size:1.3rem;font-weight:600;margin-bottom:1rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1.5rem}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;transition:box-shadow .2s;box-shadow:0 1px 3px #0001}
.card:hover{box-shadow:0 6px 20px #0001}
.card-img{width:100%;height:160px;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:3rem}
.card-body{padding:1rem}
.card-title{font-weight:600;font-size:1rem;margin-bottom:.3rem}
.card-desc{color:#64748b;font-size:.85rem;margin-bottom:.7rem;line-height:1.4}
.card-price{font-weight:700;font-size:1.15rem;color:#6366f1;margin-bottom:.8rem}
.card-stock{font-size:.8rem;color:#94a3b8;margin-bottom:.8rem}
.btn{padding:.5rem 1.1rem;border-radius:8px;border:none;cursor:pointer;font-size:.9rem;font-weight:600;transition:all .15s}
.btn-primary{background:#6366f1;color:#fff}
.btn-primary:hover{background:#4f46e5}
.btn-danger{background:#ef4444;color:#fff}
.btn-danger:hover{background:#dc2626}
.btn-outline{background:#fff;border:1.5px solid #6366f1;color:#6366f1}
.btn-outline:hover{background:#6366f110}
.btn-sm{padding:.3rem .7rem;font-size:.82rem}
.modal-overlay{display:none;position:fixed;inset:0;background:#0008;z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:2rem;width:100%;max-width:420px;box-shadow:0 20px 60px #0003}
.modal h2{margin-bottom:1.2rem}
.tabs{display:flex;gap:.5rem;margin-bottom:1.5rem}
.tab{padding:.5rem 1.2rem;border-radius:8px;border:none;cursor:pointer;font-weight:600;background:#f1f5f9;color:#64748b;transition:all .15s}
.tab.active{background:#6366f1;color:#fff}
input,textarea,select{width:100%;padding:.6rem .9rem;border:1.5px solid #e2e8f0;border-radius:8px;font-size:.95rem;margin-bottom:.9rem;outline:none;transition:border-color .15s;font-family:inherit}
input:focus,textarea:focus,select:focus{border-color:#6366f1}
label{font-size:.85rem;font-weight:600;color:#374151;display:block;margin-bottom:.3rem}
.alert{padding:.7rem 1rem;border-radius:8px;margin-bottom:1rem;font-size:.9rem}
.alert-error{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.alert-success{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
.section{display:none}
.section.active{display:block}
.cart-item{display:flex;align-items:center;gap:1rem;padding:.8rem 0;border-bottom:1px solid #f1f5f9}
.cart-item-name{flex:1;font-weight:500}
.cart-item-price{color:#6366f1;font-weight:600}
.cart-total{display:flex;justify-content:space-between;font-weight:700;font-size:1.1rem;padding-top:1rem;border-top:2px solid #e2e8f0;margin-top:.5rem}
.order-row{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:1rem 1.2rem;margin-bottom:.8rem;display:flex;justify-content:space-between;align-items:center}
.badge{padding:.3rem .8rem;border-radius:999px;font-size:.8rem;font-weight:600}
.badge-confirmed{background:#dcfce7;color:#16a34a}
.badge-pending{background:#fef9c3;color:#ca8a04}
.empty{text-align:center;color:#94a3b8;padding:3rem;font-size:1rem}
.user-bar{background:#6366f110;border:1px solid #6366f130;border-radius:8px;padding:.5rem 1rem;margin-bottom:1.5rem;display:flex;align-items:center;justify-content:space-between;font-size:.9rem}
.product-detail{background:#fff;border-radius:12px;padding:2rem;max-width:600px;margin:0 auto}
</style>
</head>
<body>

<nav>
  <span class="logo">🛒 ShopAlpha</span>
  <div class="nav-links">
    <button onclick="showSection('products')">Products</button>
    <button onclick="showSection('cart')">🛒 Cart <span id="cart-count"></span></button>
    <button onclick="showSection('orders')">My Orders</button>
    <button id="auth-btn" class="btn-primary" onclick="openAuth()">Login / Register</button>
    <button id="logout-btn" style="display:none" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="container">
  <div id="user-bar" class="user-bar" style="display:none">
    👤 Logged in as <strong id="username-display"></strong>
    <button class="btn btn-outline btn-sm" onclick="showSection('add-product')">+ Add Product</button>
  </div>

  <div id="section-products" class="section active">
    <h1>Products</h1>
    <div id="product-grid" class="grid"><div class="empty">Loading products…</div></div>
  </div>

  <div id="section-cart" class="section">
    <h1>Shopping Cart</h1>
    <div id="cart-list"></div>
    <div id="cart-footer" style="display:none">
      <div class="cart-total"><span>Total</span><span id="cart-total-amount"></span></div>
      <button class="btn btn-primary" style="margin-top:1rem;width:100%" onclick="checkout()">Place Order</button>
    </div>
  </div>

  <div id="section-orders" class="section">
    <h1>My Orders</h1>
    <div id="orders-list"></div>
  </div>

  <div id="section-product-detail" class="section">
    <button class="btn btn-outline btn-sm" onclick="showSection('products')" style="margin-bottom:1.5rem">← Back to Products</button>
    <div class="product-detail" id="product-detail-content"></div>
  </div>

  <div id="section-add-product" class="section">
    <h1>Add Product</h1>
    <div style="max-width:480px;background:#fff;padding:2rem;border-radius:12px;border:1px solid #e2e8f0">
      <div id="add-product-alert"></div>
      <label>Product Name</label>
      <input id="p-name" type="text" placeholder="e.g. Wireless Headphones"/>
      <label>Description</label>
      <textarea id="p-desc" rows="3" placeholder="Product description…"></textarea>
      <label>Price ($)</label>
      <input id="p-price" type="number" step="0.01" placeholder="29.99"/>
      <label>Stock</label>
      <input id="p-stock" type="number" placeholder="100"/>
      <label>Image URL (optional)</label>
      <input id="p-img" type="text" placeholder="https://…"/>
      <button class="btn btn-primary" style="width:100%" onclick="addProduct()">Add Product</button>
    </div>
  </div>
</div>

<div id="auth-modal" class="modal-overlay">
  <div class="modal">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Login</button>
      <button class="tab" onclick="switchTab('register')">Register</button>
    </div>
    <div id="auth-alert"></div>
    <div id="login-form">
      <label>Email</label>
      <input id="l-email" type="email" placeholder="you@example.com"/>
      <label>Password</label>
      <input id="l-pass" type="password" placeholder="••••••••"/>
      <button class="btn btn-primary" style="width:100%" onclick="login()">Login</button>
    </div>
    <div id="register-form" style="display:none">
      <label>Username</label>
      <input id="r-user" type="text" placeholder="johndoe"/>
      <label>Email</label>
      <input id="r-email" type="email" placeholder="you@example.com"/>
      <label>Password</label>
      <input id="r-pass" type="password" placeholder="••••••••"/>
      <button class="btn btn-primary" style="width:100%" onclick="register()">Create Account</button>
    </div>
    <button onclick="closeAuth()" style="margin-top:1rem;width:100%;background:#f1f5f9;border:none;padding:.6rem;border-radius:8px;cursor:pointer;color:#64748b">Cancel</button>
  </div>
</div>

<script>
const API = '/api';
let currentUser = null;

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' }, credentials: 'include' };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  const data = await r.json().catch(() => ({}));
  return { ok: r.ok, status: r.status, data };
}

function showSection(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('section-' + name).classList.add('active');
  if (name === 'products') loadProducts();
  if (name === 'cart') loadCart();
  if (name === 'orders') loadOrders();
  if (name === 'add-product' && !currentUser) { openAuth(); return; }
}

function openAuth() { document.getElementById('auth-modal').classList.add('open'); }
function closeAuth() { document.getElementById('auth-modal').classList.remove('open'); }

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('auth-alert').innerHTML = '';
}

function showAlert(id, msg, type = 'error') {
  document.getElementById(id).innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
}

async function checkAuth() {
  const { ok, data } = await api('GET', '/auth/me');
  if (ok) {
    currentUser = data;
    document.getElementById('auth-btn').style.display = 'none';
    document.getElementById('logout-btn').style.display = 'inline';
    document.getElementById('user-bar').style.display = 'flex';
    document.getElementById('username-display').textContent = data.username;
  }
}

async function login() {
  const email = document.getElementById('l-email').value;
  const password = document.getElementById('l-pass').value;
  const { ok, data } = await api('POST', '/auth/login', { email, password });
  if (!ok) { showAlert('auth-alert', data.error); return; }
  currentUser = data; closeAuth(); location.reload();
}

async function register() {
  const username = document.getElementById('r-user').value;
  const email = document.getElementById('r-email').value;
  const password = document.getElementById('r-pass').value;
  const { ok, data } = await api('POST', '/auth/register', { username, email, password });
  if (!ok) { showAlert('auth-alert', data.error); return; }
  currentUser = data; closeAuth(); location.reload();
}

async function logout() {
  await api('POST', '/auth/logout'); location.reload();
}

async function loadProducts() {
  const { ok, data } = await api('GET', '/products');
  const grid = document.getElementById('product-grid');
  if (!ok || !data.length) { grid.innerHTML = '<div class="empty">No products yet.</div>'; return; }
  grid.innerHTML = data.map(p => `
    <div class="card">
      <div class="card-img" onclick="showProductDetail(${p.id})" style="cursor:pointer">${p.image_url ? `<img src="${p.image_url}" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.innerHTML='📦'"/>` : '📦'}</div>
      <div class="card-body">
        <div class="card-title" onclick="showProductDetail(${p.id})" style="cursor:pointer;text-decoration:underline;color:#6366f1">${esc(p.name)}</div>
        <div class="card-desc">${esc(p.description)}</div>
        <div class="card-price">$${parseFloat(p.price).toFixed(2)}</div>
        <div class="card-stock">Stock: ${p.stock}</div>
        <div style="display:flex;gap:.5rem">
          <button class="btn btn-outline btn-sm" onclick="showProductDetail(${p.id})">Details</button>
          <button class="btn btn-primary" style="flex:1" onclick="addToCart(${p.id})">Add to Cart</button>
        </div>
      </div>
    </div>
  `).join('');
}

async function showProductDetail(id) {
  const { ok, data } = await api('GET', '/products/' + id);
  if (!ok) { alert('Could not load product'); return; }
  document.getElementById('product-detail-content').innerHTML = `
    <div style="display:flex;gap:2rem;flex-wrap:wrap">
      <div style="width:200px;height:200px;background:#e2e8f0;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:5rem;flex-shrink:0">
        ${data.image_url ? `<img src="${esc(data.image_url)}" style="width:100%;height:100%;object-fit:cover;border-radius:12px" onerror="this.parentElement.innerHTML='📦'"/>` : '📦'}
      </div>
      <div style="flex:1;min-width:200px">
        <h1 style="font-size:1.6rem;margin-bottom:.5rem">${esc(data.name)}</h1>
        <div style="font-size:1rem;color:#64748b;margin-bottom:1.2rem;line-height:1.6">${esc(data.description)}</div>
        <div style="font-size:2rem;font-weight:800;color:#6366f1;margin-bottom:.5rem">$${parseFloat(data.price).toFixed(2)}</div>
        <div style="color:#94a3b8;margin-bottom:1.5rem">In stock: ${data.stock} units</div>
        <button class="btn btn-primary" style="padding:.7rem 2rem;font-size:1rem" onclick="addToCart(${data.id})">🛒 Add to Cart</button>
      </div>
    </div>
  `;
  showSection('product-detail');
}

async function addToCart(productId) {
  if (!currentUser) { openAuth(); return; }
  const { ok, data } = await api('POST', '/cart', { productId, quantity: 1 });
  if (!ok) { alert(data.error); return; }
  await refreshCartCount();
  showToast('Added to cart!');
}

async function refreshCartCount() {
  if (!currentUser) return;
  const { ok, data } = await api('GET', '/cart');
  if (ok) document.getElementById('cart-count').textContent = data.length ? `(${data.length})` : '';
}

async function loadCart() {
  if (!currentUser) { document.getElementById('cart-list').innerHTML = '<div class="empty">Please login to see your cart.</div>'; return; }
  const { ok, data } = await api('GET', '/cart');
  const list = document.getElementById('cart-list');
  const footer = document.getElementById('cart-footer');
  if (!ok || !data.length) { list.innerHTML = '<div class="empty">Your cart is empty.</div>'; footer.style.display = 'none'; return; }
  let total = 0;
  list.innerHTML = data.map(item => {
    const subtotal = parseFloat(item.product.price) * item.quantity;
    total += subtotal;
    return `<div class="cart-item">
      <span class="cart-item-name">${esc(item.product.name)} × ${item.quantity}</span>
      <span class="cart-item-price">$${subtotal.toFixed(2)}</span>
      <button class="btn btn-danger btn-sm" onclick="removeCartItem(${item.id})">Remove</button>
    </div>`;
  }).join('');
  document.getElementById('cart-total-amount').textContent = '$' + total.toFixed(2);
  footer.style.display = 'block';
}

async function removeCartItem(id) {
  await api('DELETE', '/cart/' + id); loadCart(); refreshCartCount();
}

async function checkout() {
  const { ok, data } = await api('POST', '/orders');
  if (!ok) { alert(data.error); return; }
  showToast('Order placed! Order #' + data.id);
  refreshCartCount(); showSection('orders');
}

async function loadOrders() {
  if (!currentUser) { document.getElementById('orders-list').innerHTML = '<div class="empty">Please login to see your orders.</div>'; return; }
  const { ok, data } = await api('GET', '/orders');
  const list = document.getElementById('orders-list');
  if (!ok || !data.length) { list.innerHTML = '<div class="empty">No orders yet.</div>'; return; }
  list.innerHTML = data.reverse().map(o => `
    <div class="order-row">
      <div>
        <div style="font-weight:600">Order #${o.id}</div>
        <div style="color:#64748b;font-size:.85rem">${new Date(o.created_at).toLocaleDateString()}</div>
      </div>
      <div style="font-size:1.1rem;font-weight:700;color:#6366f1">$${parseFloat(o.total).toFixed(2)}</div>
      <span class="badge badge-${o.status}">${o.status}</span>
    </div>
  `).join('');
}

async function addProduct() {
  const name = document.getElementById('p-name').value.trim();
  const description = document.getElementById('p-desc').value.trim();
  const price = document.getElementById('p-price').value;
  const stock = parseInt(document.getElementById('p-stock').value) || 0;
  const image_url = document.getElementById('p-img').value.trim();
  if (!name || !price) { showAlert('add-product-alert', 'Name and price are required.'); return; }
  const { ok, data } = await api('POST', '/products', { name, description, price, image_url, stock });
  if (!ok) { showAlert('add-product-alert', data.error); return; }
  showAlert('add-product-alert', 'Product added!', 'success');
  ['p-name','p-desc','p-price','p-stock','p-img'].forEach(id => document.getElementById(id).value = '');
}

function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:2rem;right:2rem;background:#6366f1;color:#fff;padding:.8rem 1.5rem;border-radius:10px;font-weight:600;z-index:9999;box-shadow:0 4px 15px #6366f150';
  t.textContent = msg; document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

function esc(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

checkAuth().then(() => { loadProducts(); refreshCartCount(); });
</script>
</body>
</html>
